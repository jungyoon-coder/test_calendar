<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calendar</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

.header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}

.day {
  background: #fafafa;
  border: 1px solid #ddd;
  min-height: 80px;
  padding: 5px;
  cursor: pointer;
}

.today {
  background: #dbeafe;
}

.event {
  font-size: 10px;
  background: #6366f1;
  color: white;
  padding: 2px;
  border-radius: 4px;
  margin-top: 3px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <button onclick="prev()">◀</button>
  <h3 id="title"></h3>
  <button onclick="next()">▶</button>
</div>

<div class="grid" id="week">
  <div>일</div><div>월</div><div>화</div>
  <div>수</div><div>목</div><div>금</div><div>토</div>
</div>

<div class="grid" id="calendar"></div>

</div>

<script>

let current = new Date();
let events = JSON.parse(localStorage.getItem("events") || "{}");

function save() {
  localStorage.setItem("events", JSON.stringify(events));
}

function key(d) {
  return d.toISOString().split("T")[0];
}

function render() {
  const cal = document.getElementById("calendar");
  const title = document.getElementById("title");

  cal.innerHTML = "";

  let y = current.getFullYear();
  let m = current.getMonth();

  title.innerText = y + "년 " + (m+1) + "월";

  let first = new Date(y, m, 1);
  let start = first.getDay();
  let last = new Date(y, m+1, 0).getDate();

  for(let i=0;i<start;i++){
    cal.innerHTML += "<div></div>";
  }

  for(let i=1;i<=last;i++){
    let d = new Date(y,m,i);
    let k = key(d);

    let div = document.createElement("div");
    div.className = "day";

    if(key(new Date()) === k){
      div.classList.add("today");
    }

    div.innerHTML = "<strong>"+i+"</strong>";

    if(events[k]){
      events[k].forEach(e=>{
        let el = document.createElement("div");
        el.className = "event";
        el.innerText = e;
        div.appendChild(el);
      });
    }

    div.onclick = ()=>{
      let text = prompt("일정 입력");
      if(!text) return;

      if(!events[k]) events[k] = [];
      events[k].push(text);

      save();
      render();
    };

    cal.appendChild(div);
  }
}

function prev(){
  current.setMonth(current.getMonth()-1);
  render();
}

function next(){
  current.setMonth(current.getMonth()+1);
  render();
}

render();

</script>

</body>
</html>
