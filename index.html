<!doctype html>
<html lang="ko" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule Calendar</title>

  <!-- 정상 CDN만 유지 -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { font-family: 'Noto Sans KR', sans-serif; box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }

    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    .day-cell { min-height: 90px; border: 1px solid #e8e6e1; padding: 4px; cursor: pointer; }
    .day-num { font-size: 13px; font-weight: 600; }

    .event-pill {
      font-size: 10px;
      padding: 2px 4px;
      border-radius: 4px;
      background: #6366f1;
      color: white;
      margin-top: 2px;
    }
  </style>
</head>

<body>

<div id="calendar"></div>

<script>
let current = new Date();
let events = {};

function formatDate(d) {
  return d.toISOString().split('T')[0];
}

function render() {
  const cal = document.getElementById('calendar');
  cal.innerHTML = '';

  const year = current.getFullYear();
  const month = current.getMonth();

  const last = new Date(year, month + 1, 0);

  for (let i = 1; i <= last.getDate(); i++) {
    let d = new Date(year, month, i);
    let key = formatDate(d);

    let div = document.createElement('div');
    div.className = 'day-cell';

    div.innerHTML = `<strong>${i}</strong>`;

    if (events[key]) {
      events[key].forEach(e => {
        let el = document.createElement('div');
        el.className = 'event-pill';
        el.textContent = e;
        div.appendChild(el);
      });
    }

    div.onclick = () => {
      let text = prompt("일정 입력");
      if (!text) return;
      if (!events[key]) events[key] = [];
      events[key].push(text);
      render();
    };

    cal.appendChild(div);
  }
}

render();
</script>

</body>
</html>
