<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    .cell { border:1px solid #ddd; min-height:80px; padding:4px; cursor:pointer;}
    .today { background:#eef2ff; }
    .event { font-size:10px; background:#6366f1; color:#fff; border-radius:4px; padding:2px; margin-top:2px;}
  </style>
</head>

<body class="p-4 bg-gray-100">

<div class="max-w-md mx-auto bg-white p-4 rounded shadow">

  <div class="flex justify-between mb-4">
    <button onclick="prev()">◀</button>
    <h2 id="title"></h2>
    <button onclick="next()">▶</button>
  </div>

  <div class="grid text-center font-bold mb-2">
    <div>일</div><div>월</div><div>화</div><div>수</div>
    <div>목</div><div>금</div><div>토</div>
  </div>

  <div id="calendar" class="grid"></div>
</div>

<script>
let date = new Date();
let events = JSON.parse(localStorage.getItem('events') || '{}');

function save(){
  localStorage.setItem('events', JSON.stringify(events));
}

function key(d){
  return d.toISOString().split('T')[0];
}

function render(){
  const cal = document.getElementById('calendar');
  const title = document.getElementById('title');

  cal.innerHTML = "";

  let y = date.getFullYear();
  let m = date.getMonth();

  title.innerText = y + "년 " + (m+1) + "월";

  let first = new Date(y,m,1);
  let start = first.getDay();
  let last = new Date(y,m+1,0).getDate();

  for(let i=0;i<start;i++){
    cal.innerHTML += "<div></div>";
  }

  for(let i=1;i<=last;i++){
    let d = new Date(y,m,i);
    let k = key(d);

    let div = document.createElement('div');
    div.className = "cell";

    if(key(new Date()) === k){
      div.classList.add("today");
    }

    div.innerHTML = "<strong>"+i+"</strong>";

    if(events[k]){
      events[k].forEach(e=>{
        let el = document.createElement('div');
        el.className = "event";
        el.innerText = e;
        div.appendChild(el);
      });
    }

    div.onclick = ()=>{
      let text = prompt("일정 입력");
      if(!text) return;

      if(!events[k]) events[k] = [];
      events[k].push(text);

      save();
      render();
    };

    cal.appendChild(div);
  }
}

function prev(){ date.setMonth(date.getMonth()-1); render(); }
function next(){ date.setMonth(date.getMonth()+1); render(); }

render();
</script>

</body>
</html>
